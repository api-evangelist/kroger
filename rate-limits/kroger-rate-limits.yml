specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Kroger
providerId: kroger
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Groceries
  - Retail
description: Kroger Developer Portal does not publish numeric per-second or per-minute rate limits for
  its Public or Partner APIs. Limits are governed by the developer agreement and are typically negotiated
  with Kroger Digital for partner integrations.
sources:
  - https://developer.kroger.com/
  - https://developer.kroger.com/manage/documentation/policies
notes: No published numeric rate limits; consumers should expect HTTP 429 throttling and use exponential
  backoff. Specific limits must be confirmed via Kroger developer support or the partner agreement.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Public API access
    scope: api-key
    metric: varies
    limit: 'undocumented; honor 429 responses'
  - name: Partner API access
    scope: account
    metric: varies
    limit: 'see partner agreement'
policies:
  - name: Backoff Strategy
    description: Honor Retry-After when present; otherwise apply exponential backoff with jitter on 429
      responses.
  - name: Token Lifetime
    description: OAuth 2 access tokens issued by the Kroger Authorization endpoints have short lifetimes;
      cache and refresh rather than re-requesting on every call.
  - name: Partner Limits Are Negotiated
    description: Partner-tier limits are agreed in the partner contract; Kroger may apply per-application
      and per-account ceilings independent of any public values.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
