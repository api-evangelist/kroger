specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Kroger
providerId: kroger
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Groceries
  - Retail
  - Partner API
description: Kroger Developer Portal does not publish a public commercial pricing page. The Public APIs
  (Identity, Locations, Products, Cart, Authorization) are free for registered developers, while the
  Partner APIs (Cart Partner, Location Partner, Products Partners, Seamless Delivery, Locker Integration)
  require a partner agreement negotiated with Kroger Digital. No per-tier prices are listed publicly.
sources:
  - https://developer.kroger.com/
  - https://developer.kroger.com/manage/documentation/policies
notes: No public pricing page; access is gated by registration (Public APIs) or partner agreement (Partner
  APIs). Tiers, quotas, and pricing must be confirmed directly with Kroger Digital.
plans:
  - id: kroger-public-developer
    name: Public Developer
    type: freemium
    description: Free registered-developer access to the Kroger Public APIs. Granted by signing in to
      developer.kroger.com and registering an application; no published cost.
    entries:
      - label: API access
        name: api_access
        type: quota
        metric: request
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Kroger Authorization API (Public)
      - name: Kroger Cart API (Public)
      - name: Kroger Identity API (Public)
      - name: Kroger Location API (Public)
      - name: Kroger Products API (Public)
  - id: kroger-partner
    name: Partner
    type: enterprise
    description: Negotiated partner access to higher-privilege APIs (Cart Partner, Location Partner,
      Products Partners, Seamless Delivery, Locker Integration, Authorization Partners). Requires a signed
      partner agreement; pricing is not published.
    entries:
      - label: Partner agreement
        name: partner_terms
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Kroger Authorization API (Partners)
      - name: Kroger Cart API (Partner)
      - name: Kroger Catalog API
      - name: Kroger Catalog API V2
      - name: Kroger Identity API
      - name: Kroger Location API (Partner)
      - name: Kroger Products API (Partners)
      - name: Kroger Seamless Delivery API
      - name: Kroger Locker Integration APIs (Partners)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
